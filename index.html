<!DOCTYPE html>
<html>
<head>
<title>Facebook na Hausawa v1</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial; max-width:600px; margin:auto; padding:10px; background:#f0f2f5}
.post{border:1px solid #ddd; padding:12px; margin:10px 0; border-radius:8px; background:white}
button{background:#1877f2; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer}
input, textarea{width:100%; padding:8px; margin:5px 0; border:1px solid #ccc; border-radius:5px}
</style>
</head>
<body>

<h2>📘 Facebook na Hausawa v1</h2>

<div id="auth">
<h3>Bude Account / Shiga</h3>
<input id="suna" placeholder="Saka suna"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="signUp()">Bude Account</button>
<button onclick="login()">Shiga</button>
</div>

<div id="app" style="display:none">
<h3>Rubuta Post</h3>
<textarea id="rubutu" placeholder="Me ke damun ka?" rows="3"></textarea><br>
<button onclick="post()">Post</button>
<hr>
<h3>Posts</h3>
<div id="posts"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://dytqxwosyevjkaajrtnb.supabase.co'
const SUPABASE_KEY = 'sb_publishable_M9VMznlXaCYY0UnamCsO3Q_HVWyhFIo'
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

async function signUp() {
  let suna = document.getElementById('suna').value
  let pass = document.getElementById('pass').value
  if(!suna ||!pass) return alert('Cika suna da password')
  let {data, error} = await db.from('users').insert([{suna, password: pass}]).select()
  if(!error) {
    localStorage.setItem('user_id', data[0].id)
    localStorage.setItem('suna', suna)
    document.getElementById('auth').style.display='none'
    document.getElementById('app').style.display='block'
    loadPosts()
  } else alert('Suna ya riga ya wanzu, ka gwada wani')
}

async function login() {
  let suna = document.getElementById('suna').value
  let pass = document.getElementById('pass').value
  let {data} = await db.from('users').select().eq('suna', suna).eq('password', pass)
  if(data.length > 0) {
    localStorage.setItem('user_id', data[0].id)
    localStorage.setItem('suna', suna)
    document.getElementById('auth').style.display='none'
    document.getElementById('app').style.display='block'
    loadPosts()
  } else alert('Suna ko password ba daidai ba')
}

async function post() {
  let rubutu = document.getElementById('rubutu').value
  let user_id = localStorage.getItem('user_id')
  if(!rubutu) return alert('Rubuta wani abu')
  await db.from('posts').insert([{user_id, rubutu}])
  document.getElementById('rubutu').value = ''
  loadPosts()
}

async function loadPosts() {
  let {data} = await db.from('posts').select('*, users(suna, followers_count, id)').order('id', {ascending: false})
  let html = ''
  data.forEach(p => {
    html += `<div class="post">
      <b>${p.users.suna}</b> - Followers: ${p.users.followers_count}<br>
      ${p.rubutu}<br>
      <button onclick="follow(${p.users.id})">Follow</button>
    </div>`
  })
  document.getElementById('posts').innerHTML = html
}

async function follow(user_id) {
  let my_id = localStorage.getItem('user_id')
  if(my_id == user_id) return alert('Ba za ka iya bin kanka ba')

  let {data} = await db.from('follows').select().eq('user_id', my_id).eq('following_id', user_id)
  if(data.length > 0) return alert('Ka riga ka bi shi')

  await db.from('follows').insert([{user_id: my_id, following_id: user_id}])
  await db.rpc('increment_followers', {x: 1, row_id: user_id})
  loadPosts()
  alert('Ka bi shi!')
}

// Idan an riga an shiga, nuna app kai tsaye
if(localStorage.getItem('user_id')) {
  document.getElementById('auth').style.display='none'
  document.getElementById('app').style.display='block'
  loadPosts()
}
</script>
</body>
</html>
